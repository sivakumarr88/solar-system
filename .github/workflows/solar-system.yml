name: Solar System Workflow

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - 'feature/*'

jobs:
    build:
        name: build and test
        runs-on: ubuntu-latest

        steps:
            - name: clone repo
              uses: actions/checkout@v5

            - name: setup node
              uses: actions/setup-node@v5
              with:
                node-version: '18'

            - name: install dependencies
              run: npm install

            - name: test
              run: npm test